<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header</title>
</head>
<style>
    body {
        display: flex;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    marquee {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 55px;
        background-color: #4e534b;
        color: white;
        font-weight: bold;
    }

    marquee span{
        margin-right: 100vw;
    }
</style>

<body>

<div class="header">
    <marquee onmouseover="this.stop();" onmouseout="this.start();">
        <span>SELAMAT DATANG</span>
        <span>SEMOGA GACOR</span>
    </marquee>
</div>

</body>
</html>
