<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStudy - Riwayat Pendidikan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-white">

    <div class="container py-4">
        <div class="card shadow-sm mx-auto" style="max-width: 800px;">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="bi bi-mortarboard-fill"></i> RIWAYAT PENDIDIKAN</h4>
            </div>
            
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                        <tr class="text-center">
                            <th width="10%">No</th>
                            <th width="20%">Jenjang</th>
                            <th>Nama Sekolah / Instansi</th>
                            <th width="25%">Tahun</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="text-center">1</td>
                            <td class="fw-bold text-primary">SD</td>
                            <td>SDN Percobaan Surabaya</td>
                            <td class="text-center">2011 - 2017</td>
                        </tr>
                        <tr>
                            <td class="text-center">2</td>
                            <td class="fw-bold text-primary">SMP</td>
                            <td>SMPN 3 Waru</td>
                            <td class="text-center">2017 - 2020</td>
                        </tr>
                        <tr>
                            <td class="text-center">3</td>
                            <td class="fw-bold text-primary">SMA</td>
                            <td>SMA Hang Tuah 2 Sidoarjo</td>
                            <td class="text-center">2020 - 2023</td>
                        </tr>
                        <tr>
                            <td class="text-center">4</td>
                            <td class="fw-bold text-primary">Kuliah</td>
                            <td>S1 Teknik Informatika - Universitas Negeri Surabaya</td>
                            <td class="text-center">2023 - Sekarang</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="card-footer bg-light text-center py-2">
                <small class="text-muted">Data Riwayat Pendidikan Didik Sujatmiko</small>
            </div>
        </div>
    </div>

</body>
</html>
