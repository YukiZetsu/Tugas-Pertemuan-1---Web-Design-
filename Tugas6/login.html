<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UnesaTify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    body {
        background-color: #f8f9fa;
        overflow-x: hidden; 
    }
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .login-card {
        width: 100%;
        max-width: 400px; 
        border: none;
        border-radius: 15px;
    }
</style>
</head>
<body>

    <div class="login-container">
            <div class="card login-card shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img src="../Gambar/Logo UnesaTify.png" alt="Logo" width="70" class="mb-3">
                        <h3 class="fw-bold text-primary">Login UnesaTify</h3>
                    </div>

                <form action="#" method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="userInput" placeholder="Username" required>
                        <label for="userInput"><i class="bi bi-person-fill me-2"></i>Username</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="passInput" placeholder="Password" required>
                        <label for="passInput"><i class="bi bi-lock-fill me-2"></i>Password</label>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label text-muted" for="rememberMe">
                            Ingat saya
                        </label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-login shadow-sm">
                            LOGIN NOW <i class="bi bi-box-arrow-in-right ms-2"></i>
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Lupa password? <a href="#" class="text-decoration-none text-primary">Klik di sini</a></small>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
