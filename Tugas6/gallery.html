<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
        }
        .gallery-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #0d6efd; /* Frame biru biar senada sama navbar */
            transition: transform 0.3s;
        }
        .gallery-img:hover {
            transform: scale(1.05); /* Efek zoom saat kursor di atas gambar */
            border-color: #fff;
        }
        .marquee-style {
            background: #0d6efd;
            color: white;
            padding: 10px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="p-4">

    <div class="container">
        <h2 class="text-center mb-4 fw-bold">MY ANIME GALLERY</h2>

        <div class="marquee-style">
            <marquee behavior="scroll" direction="left">
                Selamat Datang di Koleksi GIF Anime Saya :v
            </marquee>
        </div>

        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-3 text-center">
                <img src="../Gambar/gojo.gif" class="gallery-img shadow" alt="Gojo">
                <p class="mt-2 fw-bold">Anime Scene 1</p>
            </div>
            <div class="col-6 col-md-4 col-lg-3 text-center">
                <img src="../Gambar/Anime2.gif" class="gallery-img shadow" alt="Anime 2">
                <p class="mt-2 fw-bold">Anime Scene 2</p>
            </div>
            <div class="col-6 col-md-4 col-lg-3 text-center">
                <img src="../Gambar/Anime1.gif" class="gallery-img shadow" alt="Anime 1">
                <p class="mt-2 fw-bold">Anime Scene 3</p>
            </div>
            <div class="col-6 col-md-4 col-lg-3 text-center">
                <img src="../Gambar/Anime3.gif" class="gallery-img shadow" alt="Anime 3">
                <p class="mt-2 fw-bold">Anime Scene 4</p>
            </div>
             <div class="col-6 col-md-4 col-lg-3 text-center">
                <img src="../Gambar/Anime4.gif" class="gallery-img shadow" alt="Anime 3">
                <p class="mt-2 fw-bold">Anime Scene 5</p>
            </div>
             <div class="col-6 col-md-4 col-lg-3 text-center">
                <img src="../Gambar/Anime5.gif" class="gallery-img shadow" alt="Anime 3">
                <p class="mt-2 fw-bold">Anime Scene 6</p>
            </div>
        </div>
    </div>

</body>
</html>
